<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrology App</title>
    <link rel="stylesheet" href="./style.css">
    <style>
       
    </style>
</head>

<body>
    <div class="astro-form-container">
        <h2>Astrology Insights</h2>
        <form id="astroForm">
            <label for="firstname">First Name:</label>
            <input type="text" id="firstname" name="firstname" required>

            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lastname" required>

            <label>Date of Birth:</label>
            <div class="birth-row">
                <input type="number" id="date" name="date" placeholder="Day" min="1" max="31" required>
                <input type="number" id="month" name="month" placeholder="Month" min="1" max="12" required>
                <input type="number" id="year" name="year" placeholder="Year" min="1900" max="2025" required>
            </div>

            <input type="submit" value="Get Insights">
        </form>

        <div class="result" id="result"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
